<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slaap CPAP Pro v2.7</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='a' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2338bdf8'/%3E%3Cstop offset='100%25' stop-color='%230ea5e9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='50' fill='url(%23a)'/%3E%3Ctext x='50%25' y='60%25' font-family='sans-serif' font-weight='bold' font-size='50' fill='%230b0e14' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: rgba(255,255,255,0.07); --blue: #38bdf8; --purple: #a855f7; --green: #4ade80; --red: #fb7185; }
        body { background: var(--bg); color: #e2e8f0; font-family: -apple-system, sans-serif; padding: 10px; margin: 0; padding-bottom: 70px; }
        h1 { font-size: 18px; color: var(--blue); text-align: center; margin: 10px 0; }
        
        .input-section { background: rgba(56, 189, 248, 0.05); padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(56, 189, 248, 0.3); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        label { display: block; font-size: 9px; color: #94a3b8; text-transform: uppercase; margin-bottom: 2px; }
        input, textarea { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 13px; }
        button { background: var(--blue); border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; color: #0b0e14; margin-top: 8px; }

        .card { background: var(--card); padding: 12px; border-radius: 14px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .chart-box { height: 200px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-alt { background: transparent; color: #94a3b8; border: 1px solid #334155; font-size: 12px; padding: 8px; }
        .btn-danger { color: var(--red); border-color: var(--red); }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        td { padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        
        /* Je persoonlijke signatuur onderaan */
        .signature { text-align: center; font-family: 'Snell Roundhand', 'Brush Script MT', cursive; font-style: italic; font-size: 12px; color: #64748b; margin-top: 25px; margin-bottom: 15px; opacity: 0.8; }
    </style>
</head>
<body>

    <h1>Slaap & CPAP Dashboard</h1>

    <div class="input-section">
        <div class="input-grid">
            <div><label>AHI (myAir)</label><input type="number" id="inAHI" step="0.1" placeholder="1.4"></div>
            <div><label>REM (bijv 1:10)</label><input type="text" id="inREM" placeholder="1:10"></div>
            <div><label>Met Masker</label><input type="text" id="inSlaap" placeholder="5:21"></div>
            <div><label>Zonder Masker</label><input type="text" id="inZonder" placeholder="1:00"></div>
        </div>
        <textarea id="inNote" style="margin-top:8px" placeholder="Hoe voel je je?"></textarea>
        <button onclick="addEntry()">Nacht Opslaan</button>
    </div>

    <div class="card">
        <span style="font-size: 12px; color: var(--blue)">● AHI</span> | <span style="font-size: 12px; color: var(--purple)">● REM (minuten)</span>
        <div class="chart-box"><canvas id="trendChart"></canvas></div>
    </div>

    <div class="card">
        <span>Geschiedenis</span>
        <table id="historyTable">
            <tbody></tbody>
        </table>
        <div class="btn-group">
            <button class="btn-alt" onclick="exportData()">Backup (Download)</button>
            <button class="btn-alt btn-danger" onclick="clearData()">Alles Wissen</button>
        </div>
    </div>

    <div class="signature">
        Made by Rob Borghouts 2026
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('sleepHistory')) || [];
        let trendChart;

        function timeToMin(t) {
            if(!t || !t.includes(':')) return 0;
            const [h, m] = t.split(':').map(Number);
            return (h * 60) + m;
        }

        window.onload = function() { initChart(); updateUI(); };

        function initChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => h.date),
                    datasets: [
                        { label: 'AHI', data: history.map(h => h.ahi), borderColor: '#38bdf8', tension: 0.4, yAxisID: 'y', pointRadius: 4, pointBackgroundColor: '#38bdf8' },
                        { label: 'REM', data: history.map(h => timeToMin(h.rem)), borderColor: '#a855f7', tension: 0.4, yAxisID: 'y1', pointRadius: 4, pointBackgroundColor: '#a855f7' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { type: 'linear', display: true, position: 'left', title: {display:true, text:'AHI', color:'#38bdf8'}, grid: {color: 'rgba(255,255,255,0.05)'} },
                        y1: { type: 'linear', display: true, position: 'right', grid: {drawOnChartArea: false}, title: {display:true, text:'REM (min)', color:'#a855f7'} }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function addEntry() {
            const entry = {
                ahi: parseFloat(document.getElementById('inAHI').value) || 0,
                rem: document.getElementById('inREM').value || '0:00',
                slaap: document.getElementById('inSlaap').value || '-',
                zonder: document.getElementById('inZonder').value || '0:00',
                note: document.getElementById('inNote').value || '',
                date: new Date().toLocaleDateString('nl-NL', {day:'2-digit', month:'2-digit'})
            };
            history.push(entry);
            if(history.length > 30) history.shift();
            localStorage.setItem('sleepHistory', JSON.stringify(history));
            location.reload();
        }

        function updateUI() {
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = history.slice().reverse().map(h => `
                <tr>
                    <td><strong>${h.date}</strong><br><small>${h.slaap} (+${h.zonder})</small></td>
                    <td>AHI: <b style="color:${h.ahi<5?'#4ade80':'#fb7185'}">${h.ahi}</b><br><small>REM: ${h.rem}</small></td>
                    <td style="font-size:10px; color:#94a3b8"><i>${h.note}</i></td>
                </tr>
            `).join('');
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(history));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "slaap_backup_" + new Date().toLocaleDateString() + ".json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function clearData() {
            if(confirm("Hele geschiedenis wissen?")) {
                localStorage.removeItem('sleepHistory');
                location.reload();
            }
        }
    </script>
</body>
</html>
