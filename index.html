<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Slaap & CPAP Master</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: rgba(255,255,255,0.07); --blue: #38bdf8; --green: #4ade80; --red: #fb7185; }
        body { background: var(--bg); color: #e2e8f0; font-family: -apple-system, sans-serif; padding: 15px; margin: 0; padding-bottom: 40px; }
        h1 { font-size: 22px; color: var(--blue); margin-bottom: 20px; }
        
        .input-section { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--blue); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 3px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        
        button { background: var(--blue); border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; color: #0b0e14; }

        .card { background: var(--card); padding: 15px; border-radius: 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chart-box { height: 180px; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th { text-align: left; color: #94a3b8; padding-bottom: 8px; }
        td { padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .good { color: var(--green); }
        .bad { color: var(--red); }
    </style>
</head>
<body>

    <h1>Slaap & CPAP Dashboard</h1>

    <div class="input-section">
        <div class="input-grid">
            <div><label>AHI (CPAP)</label><input type="number" id="inAHI" step="0.1" placeholder="1.4"></div>
            <div><label>Slaapuren</label><input type="text" id="inSlaap" placeholder="5:14"></div>
            <div><label>Masker Lek</label><input type="text" id="inLek" placeholder="Goed"></div>
            <div><label>Gevoel (1-10)</label><input type="number" id="inMood" placeholder="7"></div>
        </div>
        <button onclick="addEntry()">Nacht Opslaan</button>
    </div>

    <div class="stats-grid">
        <div class="card">
            <span>Laatste AHI</span>
            <strong id="curAHI">--</strong>
        </div>
        <div class="card">
            <span>Masker</span>
            <strong id="curLek">--</strong>
        </div>
    </div>

    <div class="card">
        <span>AHI Trend (Laatste 7 nachten)</span>
        <div class="chart-box"><canvas id="trendChart"></canvas></div>
    </div>

    <div class="card">
        <span>Geschiedenis</span>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Slaap</th>
                    <th>AHI</th>
                    <th>Lek</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        // Data ophalen uit geheugen of leeg beginnen
        let history = JSON.parse(localStorage.getItem('sleepHistory')) || [];
        let trendChart;

        function initChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map((_, i) => i + 1),
                    datasets: [{
                        data: history.map(h => h.ahi),
                        borderColor: '#38bdf8',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(56, 189, 248, 0.1)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true }, x: { display: false } },
                    plugins: { legend: { display: false } }
                }
            });
            updateUI();
        }

        function addEntry() {
            const ahi = document.getElementById('inAHI').value;
            const slaap = document.getElementById('inSlaap').value;
            const lek = document.getElementById('inLek').value;

            if(!ahi || !slaap) return alert("Vul minimaal AHI en Slaapuren in");

            const newEntry = { ahi: parseFloat(ahi), slaap, lek, date: new Date().toLocaleDateString() };
            history.push(newEntry);
            if(history.length > 7) history.shift(); // Maximaal 7 nachten

            localStorage.setItem('sleepHistory', JSON.stringify(history));
            updateUI();
            
            // Grafiek updaten
            trendChart.data.labels = history.map((_, i) => i + 1);
            trendChart.data.datasets[0].data = history.map(h => h.ahi);
            trendChart.update();
        }

        function updateUI() {
            if(history.length === 0) return;
            const last = history[history.length - 1];
            
            document.getElementById('curAHI').innerText = last.ahi + " /u";
            document.getElementById('curAHI').className = last.ahi < 5 ? 'good' : 'bad';
            document.getElementById('curLek').innerText = last.lek;

            // Tabel vullen
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = history.slice().reverse().map(h => `
                <tr>
                    <td>${h.slaap}</td>
                    <td class="${h.ahi < 5 ? 'good' : 'bad'}">${h.ahi}</td>
                    <td>${h.lek}</td>
                </tr>
            `).join('');
        }

        initChart();
    </script>
</body>
</html>
