<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slaap & CPAP Pro v3.7</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2338bdf8'/%3E%3Cstop offset='100%25' stop-color='%2310b981'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='50' fill='url(%23g)'/%3E%3Ctext x='50%25' y='67%25' font-family='Arial' font-weight='900' font-size='55' fill='%230b0e14' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2338bdf8'/%3E%3Cstop offset='100%25' stop-color='%2310b981'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='50' fill='url(%23g)'/%3E%3Ctext x='50%25' y='67%25' font-family='Arial' font-weight='900' font-size='55' fill='%230b0e14' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #fdf6e3; --card: #ffffff; --blue: #38bdf8; --purple: #a855f7; 
            --green: #10b981; --red: #fb7185; --text: #484f58; --nav: #f3f4f6; 
            --input-bg: #f9fafb; --border: #e5e7eb; --grid: #f3f4f6;
        }

        body.dark-mode {
            --bg: #0b0e14; --card: #161b22; --text: #e2e8f0; --nav: #010409;
            --input-bg: #010409; --border: #30363d; --grid: #30363d;
        }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; padding-bottom: 90px; transition: 0.3s; }
        h1 { font-size: 20px; color: var(--blue); text-align: center; margin-bottom: 15px; font-weight: 800; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        .input-card { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-size: 10px; color: #94a3b8; text-transform: uppercase; display: block; margin-bottom: 4px; font-weight: 700; }
        input, textarea { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 14px; }
        
        .btn-main { background: var(--blue); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; margin-top: 10px; font-size: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .navbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); }
        .nav-btn { color: #94a3b8; text-align: center; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: none; flex: 1; }
        .nav-btn.active { color: var(--blue); }
        .nav-btn svg { display: block; margin: 0 auto 4px; width: 22px; height: 22px; fill: currentColor; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 0; border-top: 1px solid var(--border); }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: bold; }
        .del-btn { color: var(--red); background: none; border: none; font-size: 22px; cursor: pointer; }
        .btn-small { background: var(--nav); color: var(--text); border: none; padding: 8px; border-radius: 6px; font-size: 11px; flex: 1; font-weight: 600; cursor: pointer; }
        .signature { text-align: center; font-family: 'Snell Roundhand', cursive; font-size: 12px; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>
        Slaap & CPAP Pro
    </h1>

    <div id="dashboard" class="tab-content active">
        <div class="input-card">
            <div class="grid">
                <div><label>AHI (myAir)</label><input type="number" id="inAHI" step="0.1" placeholder="1.4"></div>
                <div><label>Met Masker</label><input type="text" id="inSlaap" placeholder="5:21"></div>
                <div><label>Diepe Slaap</label><input type="text" id="inDiep" placeholder="0:45"></div>
                <div><label>REM Slaap</label><input type="text" id="inREM" placeholder="1:10"></div>
                <div><label>Zonder Masker</label><input type="text" id="inZonder" placeholder="1:00"></div>
                <div><label>Lek (L/min)</label><input type="text" id="inLek" placeholder="Goed"></div>
            </div>
            <textarea id="inNote" style="margin-top:10px" placeholder="Notitie..."></textarea>
            <button class="btn-main" onclick="addEntry()">Nacht Opslaan & Update Widget</button>
        </div>

        <div class="card">
            <div style="height: 230px;"><canvas id="sleepChart"></canvas></div>
        </div>

        <div class="card">
            <span style="font-weight:bold; font-size:14px; display:block; margin-bottom:10px;">Geschiedenis</span>
            <table id="historyTable"><tbody></tbody></table>
            
            <div style="display:flex; gap:8px; margin-top:20px;">
                <button class="btn-small" onclick="save()">Backup</button>
                <button class="btn-small" onclick="document.getElementById('importFile').click()">Herstellen</button>
                <button class="btn-small" style="color:var(--red);" onclick="clearData()">Wissen</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)" accept=".json">
            </div>
        </div>
        <div class="signature">Made by Rob Borghouts 2026</div>
    </div>

    <div id="analyse" class="tab-content">
        <div class="card" style="text-align:center; padding:30px 20px;">
            <div style="font-size:40px; margin-bottom:10px;">🧠</div>
            <h2 style="color:var(--blue); margin:0;">AI Coach</h2>
            <div id="aiResponse" style="text-align:left; margin-top:20px; line-height:1.7; font-size:14px;">Wacht op data...</div>
        </div>
    </div>

    <div class="navbar">
        <button class="nav-btn active" onclick="showTab('dashboard', this)">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> Dashboard
        </button>
        <button class="nav-btn" onclick="toggleDarkMode()">
            <svg id="themeIcon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg> Thema
        </button>
        <button class="nav-btn" onclick="showTab('analyse', this)">
            <svg viewBox="0 0 24 24"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/></svg> AI Coach
        </button>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('sleepHistory')) || [];
        let sleepChart;

        function tToM(t) {
            if(!t || !t.includes(':')) return 0;
            const [h, m] = t.split(':').map(Number);
            return (h * 60) + m;
        }

        window.onload = function() {
            if(localStorage.getItem('darkMode') === 'enabled') {
                document.body.classList.add('dark-mode');
                updateThemeIcon(true);
            }
            initChart(); updateUI(); doAI();
        };

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
            updateThemeIcon(isDark);
            initChart(); // Ververs grafiekkleuren
        }

        function updateThemeIcon(isDark) {
            const path = document.querySelector('#themeIcon path');
            if(isDark) {
                path.setAttribute('d', 'M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zM5.99 18.01l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0z');
            } else {
                path.setAttribute('d', 'M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z');
            }
        }

        function initChart() {
            const ctx = document.getElementById('sleepChart').getContext('2d');
            const isDark = document.body.classList.contains('dark-mode');
            const gridColor = isDark ? '#30363d' : '#f3f4f6';
            
            const maxMins = history.length > 0 ? Math.max(...history.map(h => Math.max(tToM(h.rem), tToM(h.diep)))) : 60;
            const y1Limit = Math.max(80, Math.ceil((maxMins + 20) / 20) * 20);

            if (sleepChart) sleepChart.destroy();

            sleepChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => h.date),
                    datasets: [
                        { label: 'AHI', data: history.map(h => h.ahi), borderColor: '#38bdf8', yAxisID: 'y', tension: 0.3, pointRadius: 5, pointBackgroundColor: '#38bdf8' },
                        { label: 'REM', data: history.map(h => tToM(h.rem)), borderColor: '#a855f7', yAxisID: 'y1', tension: 0.3, pointRadius: 5, pointBackgroundColor: '#a855f7' },
                        { label: 'Diep', data: history.map(h => tToM(h.diep)), borderColor: '#10b981', yAxisID: 'y1', tension: 0.3, pointRadius: 5, pointBackgroundColor: '#10b981' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { position: 'left', beginAtZero: true, grid: { color: gridColor }, ticks: { color: '#38bdf8' } },
                        y1: { position: 'right', beginAtZero: true, max: y1Limit, grid: { display: false }, ticks: { color: (ctx) => ctx.tick.value >= 60 ? '#a855f7' : '#10b981' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function addEntry() {
            const d = {
                id: Date.now(),
                ahi: parseFloat(document.getElementById('inAHI').value) || 0,
                rem: document.getElementById('inREM').value || '0:00',
                diep: document.getElementById('inDiep').value || '0:00',
                slaap: document.getElementById('inSlaap').value || '-',
                zonder: document.getElementById('inZonder').value || '0:00',
                note: document.getElementById('inNote').value || '',
                date: new Date().toLocaleDateString('nl-NL', {day:'2-digit', month:'2-digit'})
            };
            history.push(d);
            save();
        }

        function deleteEntry(id) {
            if(confirm("Verwijderen?")) { history = history.filter(h => h.id !== id); save(); }
        }

        function save() {
            localStorage.setItem('sleepHistory', JSON.stringify(history));
            const blob = new Blob([JSON.stringify(history)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'slaap_data.json';
            a.click();
            setTimeout(() => { location.reload(); }, 500);
        }

        function updateUI() {
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = history.slice().reverse().map(h => `
                <tr>
                    <td><strong>${h.date}</strong><br><small style="color:#94a3b8">${h.slaap} (+${h.zonder})</small></td>
                    <td align="right">
                        <span class="badge" style="background:${h.ahi<5?'rgba(16,185,129,0.1)':'rgba(251,113,133,0.1)'}; color:${h.ahi<5?'#10b981':'#fb7185'}">AHI ${h.ahi}</span><br>
                        <small style="color:#94a3b8">R:${h.rem} D:${h.diep}</small>
                    </td>
                    <td align="right"><button class="del-btn" onclick="deleteEntry(${h.id})">×</button></td>
                </tr>
            `).join('');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(Array.isArray(data)) { history = data; save(); }
                } catch(err) { alert("Fout bij laden."); }
            };
            reader.readAsText(file);
        }

        function doAI() {
            if(history.length < 1) return;
            const last = history[history.length-1];
            document.getElementById('aiResponse').innerHTML = `De laatste AHI was <b>${last.ahi}</b>. Slaapkwaliteit (R+D): ${tToM(last.rem)+tToM(last.diep)} min.`;
        }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function clearData() { if(confirm("Alles wissen?")) { localStorage.removeItem('sleepHistory'); location.reload(); } }
    </script>
</body>
</html>
