<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slaap CPAP Pro v2.9</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='a' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2338bdf8'/%3E%3Cstop offset='100%25' stop-color='%2310b981'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='50' fill='url(%23a)'/%3E%3Ctext x='50%25' y='65%25' font-family='sans-serif' font-weight='bold' font-size='50' fill='%230b0e14' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: rgba(255,255,255,0.07); --blue: #38bdf8; --purple: #a855f7; --green: #4ade80; --red: #fb7185; --nav-bg: #1e293b; }
        body { background: var(--bg); color: #e2e8f0; font-family: -apple-system, sans-serif; padding: 10px; margin: 0; padding-bottom: 75px; }
        h1 { font-size: 18px; color: var(--blue); text-align: center; margin: 10px 0; }
        .input-section { background: rgba(56, 189, 248, 0.05); padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(56, 189, 248, 0.3); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        label { display: block; font-size: 9px; color: #94a3b8; text-transform: uppercase; margin-bottom: 2px; }
        input, textarea { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 13px; }
        button { background: var(--blue); border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; color: #0b0e14; margin-top: 8px; }
        .card { background: var(--card); padding: 12px; border-radius: 14px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .chart-box { height: 220px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .navbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav-bg); display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { color: #94a3b8; text-align: center; padding: 15px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--blue); border-top: 2px solid var(--blue); background: rgba(255,255,255,0.02); }
        .ai-report { padding: 5px; line-height: 1.6; color: #cbd5e1; font-size: 13px; }
        .ai-report strong { color: var(--blue); }
        .highlight { color: var(--green); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        td { padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .signature { text-align: center; font-family: cursive; font-size: 11px; color: #64748b; margin: 20px 0; opacity: 0.7; }
        .legend { display: flex; justify-content: space-around; font-size: 10px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1>Slaap & CPAP Totaal</h1>

    <div id="tabInvoer" class="tab-content active">
        <div class="input-section">
            <div class="input-grid">
                <div><label>AHI (myAir)</label><input type="number" id="inAHI" step="0.1" placeholder="1.4"></div>
                <div><label>Met Masker</label><input type="text" id="inSlaap" placeholder="5:21"></div>
                <div><label>Diepe Slaap</label><input type="text" id="inDiep" placeholder="0:45"></div>
                <div><label>REM Slaap</label><input type="text" id="inREM" placeholder="1:10"></div>
                <div><label>Zonder Masker</label><input type="text" id="inZonder" placeholder="1:00"></div>
                <div><label>Lek</label><input type="text" id="inLek" placeholder="Goed"></div>
            </div>
            <textarea id="inNote" style="margin-top:8px" placeholder="Notitie (gevoel, lawaai...)"></textarea>
            <button onclick="addEntry()">Nacht Opslaan</button>
        </div>

        <div class="card">
            <div class="legend">
                <span style="color:var(--blue)">● AHI</span>
                <span style="color:var(--purple)">● REM</span>
                <span style="color:var(--green)">● DIEP</span>
            </div>
            <div class="chart-box"><canvas id="trendChart"></canvas></div>
        </div>

        <div class="card">
            <span>Logboek</span>
            <table id="historyTable"><tbody></tbody></table>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button style="background:#334155; color:white; font-size:11px;" onclick="exportData()">Backup</button>
                <button style="background:#450a0a; color:var(--red); font-size:11px;" onclick="clearData()">Wissen</button>
            </div>
        </div>
        <div class="signature">Made by Rob Borghouts 2026</div>
    </div>

    <div id="tabAnalyse" class="tab-content">
        <div class="card">
            <div style="text-align: center; font-size: 30px; margin-bottom: 10px;">🤖 AI Coach</div>
            <div id="aiAnalysis" class="ai-report">Wacht op data...</div>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item active" onclick="switchTab('tabInvoer', this)">Dashboard</div>
        <div class="nav-item" onclick="switchTab('tabAnalyse', this)">AI Analyse</div>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('sleepHistory')) || [];
        let trendChart;

        function timeToMin(t) {
            if(!t || !t.includes(':')) return 0;
            const [h, m] = t.split(':').map(Number);
            return (h * 60) + m;
        }

        window.onload = function() { initChart(); updateUI(); generateAIAnalysis(); };

        function initChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => h.date),
                    datasets: [
                        { label: 'AHI', data: history.map(h => h.ahi), borderColor: '#38bdf8', tension: 0.4, yAxisID: 'y' },
                        { label: 'REM', data: history.map(h => timeToMin(h.rem)), borderColor: '#a855f7', tension: 0.4, yAxisID: 'y1' },
                        { label: 'Diep', data: history.map(h => timeToMin(h.diep)), borderColor: '#4ade80', tension: 0.4, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { type: 'linear', display: true, position: 'left', title: {display:true, text:'AHI'} },
                        y1: { type: 'linear', display: true, position: 'right', title: {display:true, text:'Minuten'}, grid: {drawOnChartArea:false} }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function addEntry() {
            const entry = {
                ahi: parseFloat(document.getElementById('inAHI').value) || 0,
                rem: document.getElementById('inREM').value || '0:00',
                diep: document.getElementById('inDiep').value || '0:00',
                slaap: document.getElementById('inSlaap').value || '-',
                zonder: document.getElementById('inZonder').value || '0:00',
                lek: document.getElementById('inLek').value || '-',
                note: document.getElementById('inNote').value || '',
                date: new Date().toLocaleDateString('nl-NL', {day:'2-digit', month:'2-digit'})
            };
            history.push(entry);
            if(history.length > 30) history.shift();
            localStorage.setItem('sleepHistory', JSON.stringify(history));
            location.reload();
        }

        function updateUI() {
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = history.slice().reverse().map(h => `
                <tr>
                    <td><strong>${h.date}</strong><br><small>${h.slaap} (+${h.zonder})</small></td>
                    <td>AHI: <b>${h.ahi}</b><br><small>R:${h.rem} D:${h.diep}</small></td>
                    <td style="font-size:10px; color:#94a3b8"><i>${h.note}</i></td>
                </tr>
            `).join('');
        }

        function generateAIAnalysis() {
            const container = document.getElementById('aiAnalysis');
            if(history.length < 2) return container.innerHTML = "Voer meer nachten in voor een AI analyse.";

            const avgAHI = history.reduce((s, n) => s + n.ahi, 0) / history.length;
            const avgDiep = history.reduce((s, n) => s + timeToMin(n.diep), 0) / history.length;
            const lastNight = history[history.length - 1];

            let advice = `Gemiddeld is je AHI <strong>${avgAHI.toFixed(1)}</strong>. `;
            advice += `Je diepe slaap is gemiddeld <strong>${Math.round(avgDiep)} min</strong>.<br><br>`;

            if(timeToMin(lastNight.diep) < 45) {
                advice += "⚠️ <span class='highlight'>Lichte Slaap Alert:</span> Je diepe slaap was vannacht aan de lage kant. Probeer eens te letten op cafeïne of schermtijd voor het slapen.<br>";
            } else {
                advice += "✅ <span class='highlight'>Goed Herstel:</span> Je diepe slaap ziet er stabiel uit.<br>";
            }

            if(timeToMin(lastNight.zonder) > 60) {
                advice += "<br>💡 <strong>Tip:</strong> Je slaapt relatief lang zonder masker. Dit kan je AHI gemiddelde van de hele nacht ongemerkt omhoog halen.";
            }

            container.innerHTML = advice;
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(history));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "slaap_export.json");
            downloadAnchorNode.click();
        }

        function clearData() {
            if(confirm("Alles wissen?")) { localStorage.removeItem('sleepHistory'); location.reload(); }
        }
    </script>
</body>
</html>
