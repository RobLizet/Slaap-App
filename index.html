<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slaap & CPAP Trend</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: rgba(255,255,255,0.07); --blue: #38bdf8; --green: #4ade80; --red: #fb7185; }
        body { background: var(--bg); color: #e2e8f0; font-family: -apple-system, sans-serif; padding: 15px; margin: 0; }
        .input-section { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--blue); }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        button { background: var(--blue); border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .card { background: var(--card); padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .chart-box { height: 200px; width: 100%; }
        h2 { font-size: 16px; color: var(--blue); margin-top: 20px; }
        .good { color: var(--green); }
        .bad { color: var(--red); }
    </style>
</head>
<body>

    <h1>Slaap Trend 📈</h1>

    <div class="input-section">
        <label style="font-size: 12px;">AHI van vannacht:</label>
        <input type="number" id="inAHI" step="0.1" placeholder="Bijv. 1.4">
        <button onclick="addEntry()">Voeg Nacht Toe</button>
    </div>

    <div class="card">
        <span>Laatste AHI Score</span>
        <strong id="currentAHI" style="font-size: 24px;">--</strong>
    </div>

    <div class="card">
        <span>AHI Trend (Laatste 7 nachten)</span>
        <div class="chart-box">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <script>
        let ahiHistory = JSON.parse(localStorage.getItem('ahiHistory')) || [0, 0, 0, 0, 0, 0, 0];
        let trendChart;

        function initChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['-6', '-5', '-4', '-3', '-2', '-1', 'Nu'],
                    datasets: [{
                        label: 'AHI',
                        data: ahiHistory,
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.2)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, grid: { color: '#334155' } }, x: { grid: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });
            document.getElementById('currentAHI').innerText = ahiHistory[ahiHistory.length - 1] + " /u";
        }

        function addEntry() {
            const val = parseFloat(document.getElementById('inAHI').value);
            if (isNaN(val)) return alert("Vul een getal in");

            ahiHistory.shift(); // Verwijder oudste
            ahiHistory.push(val); // Voeg nieuwe toe
            
            localStorage.setItem('ahiHistory', JSON.stringify(ahiHistory));
            
            trendChart.data.datasets[0].data = ahiHistory;
            trendChart.update();
            
            document.getElementById('currentAHI').innerText = val + " /u";
            document.getElementById('currentAHI').className = (val < 5) ? "good" : "bad";
        }

        initChart();
    </script>
</body>
</html>
